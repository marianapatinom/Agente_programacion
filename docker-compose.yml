services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: studybot-backend
    environment:
      - PORT=8000
      - APP_ENV=development
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: studybot-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
